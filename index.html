<style>
:root{
  --bg:#0B0B0D; --card:#161519; --card2:#1E1C21; --line:#27242B;
  --txt:#F2EFE6; --muted:#8E897B; --accent:#EFCF7F; --accent2:#C49A3F;
  --p:#E3B85C; --f:#C9785A; --c:#7FA39B; --ok:#9BC47F; --bad:#D9685A; --sweet:#EFCF7F;
  --water:#6B97C2;
  --num:'Oswald','Avenir Next Condensed','Arial Narrow',sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
header{position:sticky;top:0;z-index:20;background:rgba(11,11,13,.92);backdrop-filter:blur(12px);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--line);}
.hrow{display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--num);font-weight:600;font-size:12px;letter-spacing:2.5px;white-space:nowrap;color:var(--accent);}
.logo .v{color:var(--muted);}
.datenav{display:flex;align-items:center;gap:5px;}
.datenav button{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;
  padding:6px 9px;font-size:13px;}
.datenav .cur{font-weight:700;min-width:80px;text-align:center;font-size:12px;white-space:nowrap;color:var(--txt);}
main{padding:14px 14px 0;max-width:560px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;}
.card h3{margin:0 0 10px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:2px;}
.big{font-family:var(--num);font-size:32px;font-weight:600;}
.num{font-family:var(--num);font-weight:600;}
.muted{color:var(--muted);} .small{font-size:12px;} .xs{font-size:11px;}
.row{display:flex;align-items:center;gap:8px;} .between{justify-content:space-between;}
.wrap{flex-wrap:wrap;}
button.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#1A1407;
  font-weight:900;border-radius:12px;padding:13px 16px;font-size:14px;width:100%;}
button.btn:active{opacity:.85;}
button.btn.wk{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--num);letter-spacing:1px;}
button.ghost{background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;}
button.mini{background:var(--card2);border:1px solid var(--line);color:var(--accent);
  border-radius:9px;padding:6px 10px;font-size:13px;font-weight:700;}
input,select,textarea{background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:9px;padding:8px 10px;font-size:16px;}
input[type=number]{width:78px;text-align:center;}
.hero{display:flex;align-items:baseline;justify-content:center;gap:2px;}
.hero input{font-family:var(--num);font-size:78px;font-weight:600;background:none;border:none;
  color:var(--txt);text-align:center;width:188px;padding:0;line-height:1.05;}
.hero input::placeholder{color:#3A3730;}
.hero .kg{font-family:var(--num);font-size:24px;font-weight:600;color:var(--accent);}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;}
.tile .tl{font-size:10px;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:4px;}
.tile .tv{font-family:var(--num);font-size:26px;font-weight:600;}
.tile .tu{font-size:12px;color:var(--muted);font-weight:600;}
.tile .ts{font-size:10px;color:var(--accent);margin-top:4px;}
.tile input.tin{font-family:var(--num);font-size:26px;font-weight:600;background:none;border:none;
  width:80px;text-align:center;color:var(--txt);padding:0;}
.tile input.tin::placeholder{color:#3A3730;}
.stepbtn{width:30px;height:30px;border-radius:9px;background:var(--card2);border:1px solid var(--line);
  color:var(--txt);font-size:16px;font-weight:700;flex:0 0 auto;}
.stepbtn.gold{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1A1407;border:none;}
.glink{color:var(--accent);font-size:12px;font-weight:700;text-decoration:none;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.chip{flex:0 0 auto;background:var(--card2);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;}
.chip.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#1A1407;border-color:transparent;font-weight:800;}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:rgba(16,15,18,.96);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:7px 4px calc(7px + env(safe-area-inset-bottom));}
nav button{flex:1;background:none;border:none;color:#56524A;font-size:10px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;}
nav button .ic{display:flex;}
nav button.on{color:var(--accent);}
.bar{height:10px;background:#26242B;border-radius:99px;overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
.bar.blue>i{background:var(--water);} .bar.sweet>i{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.goalnum{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.pill{border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;}
.pill.ok{background:rgba(155,196,127,.13);color:var(--ok);} .pill.bad{background:rgba(217,104,90,.15);color:var(--bad);}
.pill.gold{background:rgba(239,207,127,.13);color:var(--accent);}
.pill.dim{background:var(--card2);color:var(--muted);border:1px solid var(--line);}
.nrow{display:flex;align-items:center;gap:8px;margin-top:9px;}
.nlabel{width:64px;font-size:12px;font-weight:700;flex:0 0 auto;}
.nbar{flex:1;height:8px;background:#26242B;border-radius:99px;overflow:hidden;}
.nbar>i{display:block;height:100%;border-radius:99px;transition:width .3s;}
.nval{width:80px;text-align:right;font-size:11px;color:var(--muted);font-weight:700;flex:0 0 auto;font-family:var(--num);}
.judge{font-size:10px;border-radius:99px;padding:3px 8px;font-weight:700;flex:0 0 auto;width:58px;text-align:center;}
.coach{display:flex;gap:10px;align-items:flex-start;}
.cavatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1A1407;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto;}
.cbubble{background:var(--card2);border-radius:3px 14px 14px 14px;padding:10px 13px;font-size:13px;line-height:1.7;}
.mealgrp{border-top:1px solid var(--line);padding-top:8px;margin-top:8px;}
.fooditem{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);}
.fooditem:last-child{border-bottom:none;}
.qty{display:flex;align-items:center;gap:6px;}
.qty button{width:28px;height:28px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--accent);font-size:16px;font-weight:700;}
.excard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.exname{font-weight:700;font-size:15px;color:var(--accent);}
.setrow{display:flex;align-items:center;gap:4px;margin-top:7px;}
.setn{font-family:var(--num);font-size:10px;color:var(--muted);width:34px;flex:0 0 auto;letter-spacing:.5px;}
.sv{font-family:var(--num);font-size:17px;font-weight:600;width:52px;text-align:center;flex:0 0 auto;}
.sv i{font-style:normal;font-size:10px;color:var(--muted);margin-left:1px;}
.donebtn{width:30px;height:30px;border-radius:9px;background:transparent;border:1px solid var(--line);
  color:var(--muted);font-size:14px;font-weight:800;flex:0 0 auto;}
.donebtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1A1407;border:none;}
.delx{background:none;border:none;color:#56524A;font-size:15px;padding:2px 4px;}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:flex-end;justify-content:center;}
#modal.show{display:flex;}
.sheet{background:#141317;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:86vh;
  overflow-y:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}
.sheet h3{margin:2px 0 12px;font-size:16px;font-weight:700;}
.foodrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);}
.foodrow .nm{font-size:14px;font-weight:600;}
.foodrow .meta{font-size:11px;color:var(--muted);font-family:var(--num);}
.addbtn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#1A1407;border-radius:10px;
  width:34px;height:34px;font-size:19px;font-weight:800;flex:0 0 auto;}
#toast{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%) scale(.95);background:#F2EFE6;color:#1A1407;
  padding:16px 26px;border-radius:16px;font-size:15px;font-weight:800;z-index:99;opacity:0;
  transition:opacity .25s,transform .25s;pointer-events:none;border:2px solid var(--accent2);
  box-shadow:0 8px 30px rgba(0,0,0,.6);text-align:center;max-width:80vw;}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#rest{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:40;display:none;
  justify-content:center;}
#rest.show{display:flex;}
.restbar{background:#161519;border:1.5px solid var(--accent2);border-radius:14px;padding:8px 10px;
  display:flex;align-items:center;gap:8px;box-shadow:0 6px 24px rgba(0,0,0,.55);max-width:540px;width:calc(100% - 24px);}
.restbar .rt{font-family:var(--num);font-size:30px;font-weight:600;color:var(--accent);min-width:74px;text-align:center;letter-spacing:1px;}
.restbar.done .rt{color:var(--ok);}
.restbar .rex{font-size:11px;color:var(--muted);font-weight:700;flex:1;line-height:1.3;}
.restbar button{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:9px;
  padding:8px 9px;font-size:12px;font-weight:700;flex:0 0 auto;}
.restbar button.skip{background:var(--accent2);color:#1A1407;border:none;}
.guide li{margin-bottom:6px;font-size:14px;line-height:1.6;}
.guide .tip{color:var(--accent);}
table.rep{width:100%;border-collapse:collapse;font-size:12px;}
table.rep td,table.rep th{border-bottom:1px solid var(--line);padding:5px 4px;text-align:left;}
details{margin-top:8px;} summary{font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.photogrid .ph{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.photogrid img{width:100%;height:110px;object-fit:cover;display:block;}
.photogrid .pd{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:2px 5px;display:flex;justify-content:space-between;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);font-weight:700;}
</style>
</head>

function fmt(d){const y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+dd;}
const WD=['日','月','火','水','木','金','土'];
function fmtShort(ds){const d=new Date(ds+'T00:00:00');return (d.getMonth()+1)+'/'+d.getDate()+'('+WD[d.getDay()]+')';}

 if(!o.meals)o.meals=[];if(!o.cardio)o.cardio=[];return o;}

function shiftDate(n){const d=new Date(curDate+'T00:00:00');d.setDate(d.getDate()+n);curDate=fmt(d);render();}

/* ================= 計算 ================= */
function dayTotals(ds){const o=S.days[ds]||{};let k=0,p=0,f=0,c=0,sw=0;
 (o.meals||[]).forEach(m=>{k+=m.k*m.q;p+=m.p*m.q;f+=m.f*m.q;c+=m.c*m.q;if(m.sw)sw+=m.k*m.q;});
 return {k:Math.round(k),p:Math.round(p),f:Math.round(f),c:Math.round(c),sw:Math.round(sw)};}
function latestWeight(upto){const ds=Object.keys(S.days).filter(d=>d<=upto&&S.days[d].weight!=null).sort();
 return ds.length?{d:ds[ds.length-1],w:S.days[ds[ds.length-1]].weight}:null;}
function goalLineAt(ds){const P=S.profile;const t0=+new Date(P.startDate),t1=+new Date(P.goalDate),t=+new Date(ds);
 if(t1<=t0)return P.goalWeight;const r=Math.min(1,Math.max(0,(t-t0)/(t1-t0)));
 return P.startWeight+(P.goalWeight-P.startWeight)*r;}
function daysLeft(){return Math.max(0,Math.round((+new Date(S.profile.goalDate)-+new Date(fmt(new Date())))/86400000));}
function allFoods(){return FOODS.concat(S.custom.map(m=>Object.assign({cat:'my'},m)));}
function streak(){let n=0;const d=new Date(curDate+'T00:00:00');
 for(;;){const ds=fmt(d);const o=S.days[ds];
  const has=o&&(o.weight!=null||o.water||(o.meals&&o.meals.length)||(o.wk&&Object.keys(o.wk.logs||{}).length));
  if(has){n++;d.setDate(d.getDate()-1);}else break; if(n>999)break;}
 return n;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function ma7(pts){return pts.map(function(p){const t=p[0];
 const win=pts.filter(function(q){return q[0]<=t&&q[0]>=t-6*86400000;});
 return [t,win.reduce(function(a,b){return a+b[1];},0)/win.length];});}
function weightAt(ds){const lw=latestWeight(ds);return lw?lw.w:null;}

function lineChart(series,h){h=h||150;const w=340,pl=36,pr=10,pt=10,pb=20;
 let xs=[],ys=[];series.forEach(s=>s.pts.forEach(p=>{xs.push(p[0]);ys.push(p[1]);}));
 if(!xs.length)return '<div class="muted small" style="padding:12px 0">まだデータがありません</div>';
 let x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs),y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
 if(x1===x0)x1=x0+86400000;const ypad=(y1-y0)*0.12||1;y0-=ypad;y1+=ypad;
 const X=v=>pl+(v-x0)/(x1-x0)*(w-pl-pr),Y=v=>pt+(1-(v-y0)/(y1-y0))*(h-pt-pb);
 let g='';for(let i=0;i<=3;i++){const yy=pt+i*(h-pt-pb)/3;const yv=y1-(y1-y0)*i/3;
  g+='<line x1="'+pl+'" y1="'+yy+'" x2="'+(w-pr)+'" y2="'+yy+'" stroke="#26242B" stroke-width="1"/>'+
     '<text x="'+(pl-5)+'" y="'+(yy+4)+'" fill="#8E897B" font-size="10" text-anchor="end">'+yv.toFixed(1)+'</text>';}
 const paths=series.map(s=>{
  const d=s.pts.map((p,i)=>(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)).join(' ');
  const dots=s.dots?s.pts.map(p=>'<circle cx="'+X(p[0]).toFixed(1)+'" cy="'+Y(p[1]).toFixed(1)+'" r="2.6" fill="'+s.color+'"/>').join(''):'';
  return '<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2.2" '+(s.dash?'stroke-dasharray="5 5" opacity=".8"':'')+'/>'+dots;
 }).join('');
 const d0=new Date(x0),d1=new Date(x1);
 const lab='<text x="'+pl+'" y="'+(h-4)+'" fill="#8E897B" font-size="10">'+(d0.getMonth()+1)+'/'+d0.getDate()+'</text>'+
  '<text x="'+(w-pr)+'" y="'+(h-4)+'" fill="#8E897B" font-size="10" text-anchor="end">'+(d1.getMonth()+1)+'/'+d1.getDate()+'</text>';
 return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto">'+g+paths+lab+'</svg>';}

function judge(val,goal){const r=goal>0?val/goal:0;
 if(r<0.7)return '<span class="judge" style="background:#26242B;color:#8E897B">不足</span>';
 if(r<=1.1)return '<span class="judge" style="background:rgba(155,196,127,.13);color:#9BC47F">いい感じ</span>';
 return '<span class="judge" style="background:rgba(217,104,90,.15);color:#D9685A">とりすぎ</span>';}
function nrow(label,val,goal,color,unit){
 const pct=Math.min(100,goal>0?val/goal*100:0);
 return '<div class="nrow"><span class="nlabel">'+label+'</span>'+
  '<div class="nbar"><i style="width:'+pct+'%;background:'+color+'"></i></div>'+
  '<span class="nval">'+Math.round(val)+'<span style="font-weight:400">/'+goal+(unit||'')+'</span></span>'+judge(val,goal)+'</div>';}
function coachMsg(o,t,P){
 const hr=new Date().getHours();const isToday=curDate===fmt(new Date());
 const pLeft=P.p-t.p;
 if(o.weight==null)return 'まずは今朝の体重を入力しよう！毎朝起きてすぐ・同じ条件で測るのがコツだ⚖️';
 if(t.k>P.kcal)return 'カロリーが'+(t.k-P.kcal)+'kcalオーバー…！夜は軽めにして、明日インクラインウォーク30分でリカバリーしましょう🏃';
 if(t.sw>P.sweets)return 'スイーツ枠を'+(t.sw-P.sweets)+'kcal超えました🍰 今日はここでストップ！明日は枠内で楽しみましょう';
 const lwc=latestWeight(curDate);const wNow=lwc?lwc.w:P.startWeight;
 const sugg=Math.round((wNow*32.6-450)/50)*50;
 if(P.kcal-sugg>=100)return '体重が落ちて維持カロリーも下がってきたぞ。摂取目標を'+P.kcal.toLocaleString()+'→'+sugg.toLocaleString()+'kcalに締め直そう。<br><a class="glink" onclick="applyKcal('+sugg+')">→ ワンタップで更新する</a>';
 const d14=new Date(curDate+'T00:00:00');d14.setDate(d14.getDate()-14);const lw14=latestWeight(fmt(d14));
 const nEntries=Object.keys(S.days).filter(function(dd){return S.days[dd].weight!=null;}).length;
 if(nEntries>=10&&lw14&&Math.abs(wNow-lw14.w)<0.3&&wNow>P.goalWeight+0.5)return 'この2週間、体重が止まっているな。停滞は体が慣れた証拠で、必ず抜ける。睡眠と水分を整えて、次の面談でリフィードか−100kcalを相談しよう🔥';
 if(isToday&&hr>=18&&pLeft>40)return 'たんぱく質があと'+Math.round(pLeft)+'g足りません！夕食に鶏むね＋プロテインで巻き返しましょう💪';
 if(isToday&&hr>=15&&(o.water||0)<P.water/2)return '水分がまだ'+((o.water||0)/1000).toFixed(1)+'Lです。こまめに「+250ml」を押していきましょう💧';
 if(pLeft<=0)return 'たんぱく質'+P.p+'gクリア！すばらしい！この積み重ねが鈴木亮平への最短ルートだ🔥';
 const mk=BYDAY[new Date(curDate+'T00:00:00').getDay()];
 if(mk){const done=o.wk&&o.wk.logs&&Object.keys(o.wk.logs).length;
  return done?'今日の'+MENUS[mk].name+'、お疲れ！あとは食事とタンパク質で回復だ。明日も来いよ💪'
   :'今日は'+MENUS[mk].name+'の日だ。前回の自分を1回でも、1.25kgでも超えていくぞ🔥';}
 return '今日は休養日。回復も筋トレのうちだ。タンパク質と睡眠をしっかり整えよう💪';}

window.pasteEstimate=function(){
 if(!(navigator.clipboard&&navigator.clipboard.readText)){toast('このブラウザでは自動入力が使えません。手入力してください');return;}
 navigator.clipboard.readText().then(function(t){
  const k=t.match(/([\d,.]+)\s*kcal/i),p=t.match(/P[:：]\s*([\d.]+)/i),
   f=t.match(/F[:：]\s*([\d.]+)/i),c=t.match(/C[:：]\s*([\d.]+)/i),
   nm=t.match(/【([^/／】]+)[/／]/);
  if(!k&&!p){toast('推定フォーマット【…kcal/P:…】が見つかりませんでした');return;}
  if(nm)document.getElementById('qn').value=nm[1].trim();
  if(k)document.getElementById('qk').value=parseFloat(k[1].replace(/,/g,''));
  if(p)document.getElementById('qp').value=parseFloat(p[1]);
  if(f)document.getElementById('qf').value=parseFloat(f[1]);
  if(c)document.getElementById('qc').value=parseFloat(c[1]);
  toast('✓ 推定値を入力しました。確認して追加！');
 },function(){toast('クリップボードを読めませんでした');});};

function trainTab(){
 const o=D(curDate);
 const defKey=BYDAY[new Date(curDate+'T00:00:00').getDay()];
 const menuKey=(o.wk&&o.wk.menu)||defKey;
 const logs=(o.wk&&o.wk.logs)||{};
 const exList=menuKey?MENUS[menuKey].ex.slice():[];
 Object.keys(logs).forEach(e=>{if(exList.indexOf(e)<0)exList.push(e);});
 let vol=0;Object.keys(logs).forEach(e=>{(logs[e]||[]).forEach(s=>{vol+=(parseFloat(s.w)||0)*(parseFloat(s.r)||0);});});
 return ''+
 '<div class="card"><div class="row between"><h3 style="margin:0">'+fmtShort(curDate)+' のトレーニング</h3>'+
  (vol>0?'<span class="num" style="font-size:20px;color:var(--accent)">'+Math.round(vol).toLocaleString()+'<span class="xs muted">kg 総ボリューム</span></span>':'')+'</div>'+
  '<div style="height:8px"></div>'+
  '<div class="chips">'+Object.keys(MENUS).map(k=>'<button class="chip '+(menuKey===k?'on':'')+'" onclick="setMenu(\''+k+'\')">'+MENUS[k].name+'</button>').join('')+'</div>'+
  (menuKey==='rest'?'<div class="muted small" style="margin-top:8px">🛌 今日はレスト日。回復も計画のうち。睡眠・タンパク質・水分を整えよう。</div>':'')+
  (menuKey!=='rest'?'<details><summary>ウォームアップの基本</summary><div class="small muted" style="line-height:1.6;margin-top:6px">1) 軽い有酸素5分 → 2) 動的ストレッチ（腕回し・股関節回し・ランジウォーク） → 3) 最初のコンパウンド種目でWUセット2回（40%×10回、60%×5回）</div></details>':'')+
 '</div>'+
 (menuKey&&menuKey!=='rest'?exList.map(ex=>{
   const g=EXDB[ex];const sets=logs[ex]||[];const prev=prevLog(ex);
   return '<div class="excard">'+
    '<div class="row between"><span class="exname" onclick="openGuide(\''+ex+'\')">'+ex+(exIsDb(ex)?' <span class="xs" style="color:var(--muted);font-weight:600">片手</span>':'')+' ⓘ</span>'+
    '<span class="xs muted">'+(g?g.sr:'')+'</span></div>'+
    (g?'<div class="xs muted">'+g.t+'</div>':'')+
    (prev?'<div class="xs" style="color:var(--f);margin-top:4px">前回('+fmtShort(prev.d)+')：'+prev.txt+'</div>':'<div class="xs muted" style="margin-top:4px">前回記録なし — 今日が基準になります</div>')+
    (exMode(ex)!=='cardio'?'<div class="xs muted" style="margin-top:4px">⏱ レスト '+fmtClock(exRest(ex))+' <span style="color:var(--accent)" onclick="editRest(\''+ex+'\')">変更</span> ・ ✓を押すと自動でタイマー開始</div>':'')+
    sets.map((s,i)=>{const md=exMode(ex);
     if(md==='cardio')return '<div class="setrow" style="flex-wrap:wrap">'+
      '<span class="row" style="gap:3px"><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'min\',-5)">−</button><span class="sv" style="width:50px">'+(s.min||0)+'<i>分</i></span><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'min\',5)">＋</button></span>'+
      '<span class="row" style="gap:3px"><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'gr\',-1)">−</button><span class="sv" style="width:44px">'+(s.gr!=null?s.gr:0)+'<i>%</i></span><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'gr\',1)">＋</button></span>'+
      '<span class="row" style="gap:3px"><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'sp\',-0.5)">−</button><span class="sv" style="width:60px">'+(s.sp!=null?s.sp:0)+'<i>km/h</i></span><button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'sp\',0.5)">＋</button></span>'+
      '<button class="donebtn'+(s.d?' on':'')+'" onclick="toggleSet(\''+ex+'\','+i+')">✓</button>'+
      '<button class="delx" onclick="delSet(\''+ex+'\','+i+')">✕</button></div>';
     const unit=exUnit(ex);const rStep=unit==='秒'?5:1;const ws=wStep(ex);
     return '<div class="setrow"><span class="setn">SET '+(i+1)+'</span>'+
      (md==='bw'?'':'<button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'w\','+(-ws)+')">−</button>'+
       '<span class="sv">'+(s.w!==''&&s.w!=null?s.w:0)+'<i>kg</i></span>'+
       '<button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'w\','+ws+')">＋</button>')+
      '<button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'r\',-'+rStep+')">−</button>'+
      '<span class="sv">'+(s.r!==''&&s.r!=null?s.r:0)+'<i>'+unit+'</i></span>'+
      '<button class="stepbtn" onclick="stepSet(\''+ex+'\','+i+',\'r\','+rStep+')">＋</button>'+
      '<button class="donebtn'+(s.d?' on':'')+'" onclick="toggleSet(\''+ex+'\','+i+')">✓</button>'+
      '<button class="delx" onclick="delSet(\''+ex+'\','+i+')">✕</button></div>';}).join('')+
    '<button class="ghost" style="margin-top:8px;width:100%" onclick="addSet(\''+ex+'\')">＋ セット追加</button>'+
   '</div>';
  }).join('')+
  '<button class="ghost" style="width:100%;margin-bottom:12px" onclick="addCustomEx()">＋ メニュー外の種目を追加</button>'
 :'');
}
function ensureWk(){const o=D(curDate);if(!o.wk){const def=BYDAY[new Date(curDate+'T00:00:00').getDay()]||'uA';o.wk={menu:def,logs:{}};}
 if(!o.wk.logs)o.wk.logs={};return o.wk;}
window.setMenu=function(k){const wk=ensureWk();wk.menu=k;saveR();};
window.addSet=function(ex){const wk=ensureWk();if(!wk.logs[ex])wk.logs[ex]=[];
 const arr=wk.logs[ex];const md=exMode(ex);const p=prevLog(ex);
 if(md==='cardio'){
  const base=arr.length?arr[arr.length-1]:(p&&p.last&&p.last.min!=null?p.last:{min:30,gr:12,sp:6});
  arr.push({min:base.min||30,gr:(base.gr!=null?base.gr:12),sp:(base.sp!=null?base.sp:6)});}
 else if(md==='bw'){
  const def=exUnit(ex)==='秒'?45:10;
  const base=arr.length?arr[arr.length-1]:(p&&p.last?p.last:null);
  arr.push({r:(base&&base.r)?base.r:def});}
 else{let w=0,r=8;
  if(arr.length){w=parseFloat(arr[arr.length-1].w)||0;r=parseFloat(arr[arr.length-1].r)||8;}
  else if(p&&p.top!=null)w=p.top;
  arr.push({w:w,r:r});}
 saveR();};
window.setSet=function(ex,i,f,v){const wk=ensureWk();const s=wk.logs[ex][i];if(!s)return;
 const n=parseFloat(v);s[f]=isNaN(n)?'':n;save();};
window.stepSet=function(ex,i,f,d){const wk=ensureWk();const s=wk.logs[ex][i];if(!s)return;
 let v=(parseFloat(s[f])||0)+d;if(v<0)v=0;s[f]=Math.round(v*10)/10;saveR();};
window.toggleSet=function(ex,i){const wk=ensureWk();const s=wk.logs[ex][i];if(!s)return;
 const turningOn=!s.d;s.d=s.d?0:1;saveR();
 if(turningOn){const r=exRest(ex);if(r>0)startRest(ex,r);}};

/* ===== レストタイマー ===== */
let restState=null,restAudio=null;
function beep(){try{if(!restAudio)restAudio=new (window.AudioContext||window.webkitAudioContext)();
 const c=restAudio;if(c.state==='suspended')c.resume();
 [0,0.18,0.36].forEach(function(dt){const o=c.createOscillator(),g=c.createGain();
  o.frequency.value=880;o.connect(g);g.connect(c.destination);
  const t0=c.currentTime+dt;g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(0.25,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.13);o.start(t0);o.stop(t0+0.14);});
 }catch(e){}}
function fmtClock(s){const m=Math.floor(s/60),ss=('0'+(s%60)).slice(-2);return m+':'+ss;}
function renderRestBar(){const b=document.getElementById('restbar');if(!restState)return;
 const done=restState.remaining<=0;
 b.className='restbar'+(done?' done':'');
 b.innerHTML='<span class="rt">'+(done?'0:00':fmtClock(restState.remaining))+'</span>'+
  '<span class="rex">'+(done?'✓ レスト終了 — 次のセットへ':restState.ex+'　レスト')+'</span>'+
  (done?'':'<button onclick="adjRest(-15)">−15</button><button onclick="adjRest(15)">+15</button>')+
  '<button class="skip" onclick="stopRest()">'+(done?'閉じる':'スキップ')+'</button>';}
function startRest(ex,sec){stopRestTimer();
 restState={ex:ex,remaining:sec};
 document.getElementById('rest').classList.add('show');renderRestBar();
 restState.id=setInterval(function(){restState.remaining--;
  if(restState.remaining<=0){restState.remaining=0;renderRestBar();clearInterval(restState.id);restState.id=null;
   beep();if(navigator.vibrate)navigator.vibrate([200,100,200]);
   restState.hide=setTimeout(stopRest,5000);}
  else renderRestBar();},1000);}
function stopRestTimer(){if(restState){if(restState.id)clearInterval(restState.id);if(restState.hide)clearTimeout(restState.hide);}}
window.adjRest=function(d){if(!restState)return;restState.remaining=Math.max(1,restState.remaining+d);renderRestBar();};
window.editRest=function(ex){const cur=exRest(ex);const v=prompt(ex+' のレスト秒数',cur);
 if(v===null)return;const n=parseInt(v);if(isNaN(n)||n<0){toast('数字を入力してください');return;}
 S.rest[ex]=n;save();render();toast('✓ '+ex+' のレストを'+fmtClock(n)+'に設定');};
window.stopRest=function(){stopRestTimer();restState=null;document.getElementById('rest').classList.remove('show');};
window.delSet=function(ex,i){const wk=ensureWk();wk.logs[ex].splice(i,1);if(!wk.logs[ex].length)delete wk.logs[ex];saveR();};
window.addCustomEx=function(){const n=prompt('種目名を入力');if(!n)return;const wk=ensureWk();
 if(!wk.logs[n])wk.logs[n]=[{w:'',r:''}];saveR();};
function exMode(ex){const g=EXDB[ex];return g&&g.mode?g.mode:'wt';}
function exUnit(ex){const g=EXDB[ex];return g&&g.unit?g.unit:'回';}
function exIsDb(ex){const g=EXDB[ex];return !!(g&&g.db);}
function wStep(ex){return exIsDb(ex)?1:2.5;}
const COMPOUND=['ベンチプレス','インクラインダンベルプレス','ショルダープレス','バーベルスクワット','レッグプレス','懸垂','ダンベルロウ','シーテッドケーブルロウ','ルーマニアンデッドリフト','ブルガリアンスクワット','ヒップスラスト','ウォーキングランジ'];
function exRest(ex){if(S.rest&&S.rest[ex]!=null)return S.rest[ex];
 if(exMode(ex)==='cardio')return 0;
 if(exMode(ex)==='bw')return 45;
 if(COMPOUND.indexOf(ex)>=0)return 180;
 return 90;}
function fmtSet(s,ex){
 if(s.min!=null)return s.min+'分・勾配'+(s.gr!=null?s.gr:0)+'%・'+(s.sp!=null?s.sp:0)+'km/h';
 if(exMode(ex)==='bw')return (s.r!==''&&s.r!=null?s.r:0)+exUnit(ex);
 return (s.w!==''&&s.w!=null&&s.w>0?s.w+'kg'+(exIsDb(ex)?'(片手)':''):'自重')+'×'+(s.r!==''&&s.r!=null?s.r:0);}
function prevLog(ex){const ds=Object.keys(S.days).filter(d=>d<curDate&&S.days[d].wk&&S.days[d].wk.logs&&(S.days[d].wk.logs[ex]||[]).some(s=>s.r||s.w||s.min)).sort();
 if(!ds.length)return null;const d=ds[ds.length-1];const sets=S.days[d].wk.logs[ex].filter(s=>s.r||s.w||s.min);
 const txt=sets.map(s=>fmtSet(s,ex)).join(', ');
 let top=null;sets.forEach(s=>{if(s.w!==''&&s.w!=null&&(top==null||s.w>top))top=s.w;});
 return {d:d,txt:txt,top:top,last:sets[sets.length-1]};}
window.openGuide=function(ex){const g=EXDB[ex];
 if(!g){openModal('<h3>'+ex+'</h3><div class="muted small">カスタム種目のためガイドはありません。</div>');return;}
 openModal('<h3>'+ex+'</h3><div class="small muted">'+g.t+'　｜　'+g.sr+'</div>'+
  '<div class="guide"><div style="font-weight:800;margin:10px 0 6px">やり方</div><ol style="padding-left:20px;margin:0">'+
  g.steps.map(s=>'<li>'+s+'</li>').join('')+'</ol>'+
  '<div style="font-weight:800;margin:12px 0 6px">⚠️ 注意点・コツ</div><ul style="padding-left:20px;margin:0">'+
  g.tips.map(s=>'<li class="tip">'+s+'</li>').join('')+'</ul></div>');};

/* ================= グラフ ================= */
function graphTab(){
 const P=S.profile;
 const wPts=Object.keys(S.days).filter(d=>S.days[d].weight!=null).sort().map(d=>[+new Date(d),S.days[d].weight]);
 const bPts=Object.keys(S.days).filter(d=>S.days[d].bf!=null).sort().map(d=>[+new Date(d),S.days[d].bf]);
 const gl=[[+new Date(P.startDate),P.startWeight],[+new Date(P.goalDate),P.goalWeight]];
 const gb=[[+new Date(P.startDate),P.startBF],[+new Date(P.goalDate),P.goalBF]];
 const exNames=[];Object.keys(S.days).forEach(d=>{const wk=S.days[d].wk;if(wk&&wk.logs)Object.keys(wk.logs).forEach(e=>{if(exNames.indexOf(e)<0)exNames.push(e);});});
 if(!exSel&&exNames.length)exSel=exNames[0];
 const ePts=exSel?Object.keys(S.days).filter(d=>S.days[d].wk&&S.days[d].wk.logs&&(S.days[d].wk.logs[exSel]||[]).some(s=>s.w!==''&&s.w!=null)).sort()
  .map(d=>{let top=0;S.days[d].wk.logs[exSel].forEach(s=>{if(s.w!==''&&s.w!=null&&s.w>top)top=s.w;});return [+new Date(d),top];}):[];
 if(photosCache===null&&db)loadPhotos();
 return ''+
 '<div class="card"><h3>体重　<span class="xs muted">点線=目標 / 細線=7日平均</span></h3>'+
  lineChart([{pts:gl,color:'#5C564A',dash:1},{pts:ma7(wPts),color:'#8A7B4D'},{pts:wPts,color:'#EFCF7F',dots:1}],170)+'</div>'+
 '<div class="card"><h3>体脂肪率</h3>'+
  lineChart([{pts:gb,color:'#5C564A',dash:1},{pts:bPts,color:'#6B97C2',dots:1}],150)+'</div>'+
 '<div class="card"><h3>種目の重量推移</h3>'+
  (exNames.length?'<select onchange="exSel=this.value;render()" style="width:100%;margin-bottom:8px">'+
   exNames.map(e=>'<option '+(e===exSel?'selected':'')+'>'+e+'</option>').join('')+'</select>'+
   lineChart([{pts:ePts,color:'#9BC47F',dots:1}],150):'<div class="muted small">筋トレ記録がたまると表示されます</div>')+'</div>'+
 '<div class="card"><h3>進捗写真　<span class="xs muted">月1回・同条件で</span></h3>'+
  '<label class="ghost" style="display:block;text-align:center;margin-bottom:10px">＋ '+fmtShort(curDate)+' の写真を追加'+
  '<input type="file" accept="image/*" style="display:none" onchange="addPhoto(event)"></label>'+
  (photosCache&&photosCache.length>=2?(function(){
    const a=photosCache[0],b=photosCache[photosCache.length-1];
    const ua=URL.createObjectURL(a.blob),ub=URL.createObjectURL(b.blob);
    const wa=weightAt(a.date),wb=weightAt(b.date);
    return '<div class="grid2" style="margin-bottom:10px">'+
     '<div class="ph"><img src="'+ua+'" style="height:200px"><div class="pd"><span>BEFORE '+fmtShort(a.date)+'</span><span class="num">'+(wa?wa+'kg':'')+'</span></div></div>'+
     '<div class="ph" style="border-color:var(--accent2)"><img src="'+ub+'" style="height:200px"><div class="pd"><span>NOW '+fmtShort(b.date)+'</span><span class="num">'+(wb?wb+'kg':'')+'</span></div></div>'+
    '</div>';})():'')+
  '<div class="photogrid">'+(photosCache&&photosCache.length?photosCache.map(p=>{
    const u=URL.createObjectURL(p.blob);
    return '<div class="ph"><img src="'+u+'"><div class="pd"><span>'+fmtShort(p.date)+'</span><span onclick="delPhoto('+p.id+')">🗑</span></div></div>';
  }).join(''):'<div class="muted small" style="grid-column:1/4">Day 0の写真をここに入れましょう</div>')+'</div>'+
 '</div>';
}
function loadPhotos(){if(!db)return;const tx=db.transaction('photos','readonly').objectStore('photos').getAll();
 tx.onsuccess=function(){photosCache=tx.result.sort((a,b)=>a.date<b.date?-1:1);if(tab==='graph')render();};}
window.addPhoto=function(ev){const file=ev.target.files[0];if(!file||!db)return;
 db.transaction('photos','readwrite').objectStore('photos').add({date:curDate,blob:file}).onsuccess=function(){photosCache=null;loadPhotos();toast('写真を保存しました 📸');};};
window.delPhoto=function(id){if(!confirm('この写真を削除しますか？'))return;
 db.transaction('photos','readwrite').objectStore('photos').delete(id).onsuccess=function(){photosCache=null;loadPhotos();};};

/* ================= 設定 ================= */
function setTab(){
 const P=S.profile;
 function fld(label,key,step){return '<label class="fld">'+label+'<input type="number" step="'+(step||1)+'" inputmode="decimal" value="'+P[key]+'" onchange="setProf(\''+key+'\',this.value)" style="width:100%"></label>';}
 return ''+
 '<div class="card"><h3>目標設定</h3><div class="grid2">'+
  fld('目標体重kg','goalWeight',0.5)+
  '<label class="fld">目標日<input type="date" value="'+P.goalDate+'" onchange="setProfStr(\'goalDate\',this.value)" style="width:100%"></label>'+
  fld('目標体脂肪%','goalBF',0.5)+fld('摂取kcal','kcal',50)+
  fld('タンパク質g','p',5)+fld('脂質g','f',5)+fld('糖質g','c',10)+fld('水分ml','water',250)+
  fld('スイーツ枠kcal','sweets',50)+
 '</div><div class="xs muted" style="margin-top:8px">スタート：'+P.startDate+'　'+P.startWeight+'kg / '+P.startBF+'%</div></div>'+
 '<div class="card"><h3>週次トレーナー面談</h3>'+
  '<button class="btn" onclick="weeklyReview()">直近7日のレポートをコピー</button>'+
  '<div class="xs muted" style="margin-top:8px">コピーしたらClaudeに貼り付けてください。評価・問題点・来週の指示が返ってきます。</div></div>'+
 '<div class="card"><h3>データ</h3>'+
  '<div class="row" style="gap:8px"><button class="ghost" style="flex:1" onclick="exportJson()">エクスポート</button>'+
  '<label class="ghost" style="flex:1;text-align:center">インポート<input type="file" accept=".json" style="display:none" onchange="importJson(event)"></label></div>'+
  '<div class="xs muted" style="margin-top:8px">データはこの端末（ブラウザ）の中だけに保存されます。週1回エクスポートしてバックアップを推奨。機種変更時はインポートで復元。</div>'+
  '<button class="ghost" style="width:100%;margin-top:10px;color:var(--bad)" onclick="resetAll()">全データを初期化</button></div>'+
 '<div class="card"><h3>iPhoneに入れる方法</h3><div class="small muted" style="line-height:1.7">'+
  '① このファイルをWeb上にホスティング（GitHub Pages / Netlify等・無料）<br>'+
  '② SafariでそのURLを開く<br>③ 共有ボタン → 「ホーム画面に追加」<br>'+
  '→ アプリのように全画面で起動します。ホスティングはClaudeに「ムキムキ計画を公開したい」と言えば手伝います。</div></div>'+
 '<div class="xs muted" style="text-align:center;padding:6px 0 18px;font-family:var(--serif);font-style:italic">ムキムキ計画 vol.1 — '+P.name+' × Claude</div>';
}
window.setProf=function(k,v){const n=parseFloat(v);if(!isNaN(n))S.profile[k]=n;saveR();};
window.applyKcal=function(k){const P=S.profile;P.kcal=k;
 P.c=Math.max(120,Math.round((k-P.p*4-P.f*9)/4/5)*5);saveR();
 toast('目標を'+k.toLocaleString()+'kcal（糖質C'+P.c+'g）に更新しました');};
window.editMission=function(){const cur=S.mission?S.mission.text:'';
 const t=prompt('今週のミッション（週次面談でのClaudeの指示を貼ると、1週間ホームに表示されます）',cur);
 if(t===null)return;S.mission=t.trim()?{text:t.trim(),setAt:curDate}:null;saveR();};
window.setProfStr=function(k,v){if(v)S.profile[k]=v;saveR();};
window.exportJson=function(){const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download='mukimuki_backup_'+curDate.replace(/-/g,'')+'.json';a.click();toast('エクスポートしました');};
window.importJson=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
 r.onload=function(){try{const d=JSON.parse(r.result);if(!d.profile||!d.days)throw 0;S=d;save();render();toast('インポートしました ✓');}
 catch(e){toast('ファイルが読めませんでした');}};r.readAsText(f);};
window.resetAll=function(){if(!confirm('全データを削除します。エクスポート済みですか？'))return;
 if(!confirm('本当に初期化しますか？'))return;localStorage.removeItem(LS);location.reload();};

/* ================= 週次レビュー ================= */
window.weeklyReview=function(){
 const P=S.profile;const lines=[];
 for(let i=6;i>=0;i--){const d=new Date(curDate+'T00:00:00');d.setDate(d.getDate()-i);const ds=fmt(d);
  const o=S.days[ds]||{};const t=dayTotals(ds);
  let wk='休み';
  if(o.wk&&o.wk.logs&&Object.keys(o.wk.logs).length){
   const parts=Object.keys(o.wk.logs).map(ex=>{const sets=o.wk.logs[ex].filter(s=>s.r||s.w||s.min);
    if(!sets.length)return null;return ex+' '+sets.map(s=>fmtSet(s,ex)).join('/');}).filter(Boolean);
   if(parts.length)wk=(MENUS[o.wk.menu]?MENUS[o.wk.menu].name:'')+'：'+parts.join('、');
  }
  const cardio=(o.cardio||[]).map(c=>c.type+c.min+'分(約'+cardioKcal(c.type,c.min,ds)+'kcal)').join('、')||'なし';
  let meals='記録なし';
  if(o.meals&&o.meals.length){
   meals=MEAL_NAMES.map(function(mn){
    const its=o.meals.filter(function(m){return m.meal===mn;});
    if(!its.length)return null;
    return mn+'['+its.map(function(m){return m.n+(m.q&&m.q!==1?'×'+m.q:'');}).join('・')+']';
   }).filter(Boolean).join(' ');
  }
  lines.push(fmtShort(ds)+'｜体重'+(o.weight!=null?o.weight+'kg':'未計測')+(o.bf!=null?'/'+o.bf+'%':'')+
   '｜摂取'+t.k+'kcal P'+t.p+' F'+t.f+' C'+t.c+'（スイーツ'+t.sw+'kcal）'+
   '｜食事内容：'+meals+
   '｜水分'+((o.water||0)/1000).toFixed(1)+'L｜睡眠'+(o.sleep!=null?o.sleep+'h':'未記録')+
   '｜筋トレ：'+wk+'｜有酸素：'+cardio);
 }
 const lw=latestWeight(curDate);const w=lw?lw.w:P.startWeight;const line=goalLineAt(curDate);
 const txt='あなたは私の専属パーソナルトレーナーです（ライザップ式：結果にコミット、厳しくも温かく）。\n'+
 '以下の1週間のデータを分析して、次の5点を簡潔に出してください。\n'+
 '1. 今週の評価（100点満点と一言）\n2. 良かった点\n3. 問題点とその原因分析\n'+
 '4. 来週の具体的な指示（食事・トレーニング・生活で各1つ以上、数値で）\n5. 停滞している場合の打ち手\n'+
 '※このメッセージに食事や体の写真が添付されていたら、数値に表れない食事の質（野菜・タンパク源・加工度・外食の内容）や体の変化も必ず評価に含めてください。\n\n'+
 '【プロフィール】34歳男性 177cm。開始時('+P.startDate+') '+P.startWeight+'kg/体脂肪'+P.startBF+'%。\n'+
 '【目標】'+P.goalDate+'までに'+P.goalWeight+'kg/体脂肪'+P.goalBF+'%（鈴木亮平のような体）。週-0.3kgペース。\n'+
 '【日次目標】'+P.kcal+'kcal、P'+P.p+'g/F'+P.f+'g/C'+P.c+'g、水分'+(P.water/1000)+'L、睡眠'+P.sleep+'h以上。\n'+
 '【現在地】最新体重'+w+'kg（理想ライン'+line.toFixed(1)+'kg、差'+(w-line>=0?'+':'')+(w-line).toFixed(1)+'kg）\n'+
 '【今週のミッション】'+(S.mission&&S.mission.text?S.mission.text:'未設定')+'\n\n'+
 '【今週の記録】\n'+lines.join('\n');
 copyText(txt);
 openModal('<h3>週次面談の準備ができました</h3>'+
  '<div class="small" style="line-height:2">'+
  '① レポートをコピーしました ✓<br>'+
  '② <b>Claudeアプリ</b>を開いて貼り付け→送信<br>'+
  '③ <b>今週の食事写真があれば一緒に添付</b>すると、数値に出ない「食事の質」まで評価してくれます📷<br>'+
  '④ 返ってきた来週の指示は「ミッション編集」に貼って常時表示</div>'+
  '<div class="xs muted" style="margin-top:10px">食事写真はアプリに保存せず、普段どおりカメラロールでOK。撮るだけでも食べ方が変わります。</div>');
};
function copyText(t){
 if(navigator.clipboard&&navigator.clipboard.writeText){
  navigator.clipboard.writeText(t).then(function(){toast('コピーしました。Claudeに貼ってください 🧑‍🏫');},function(){fallbackCopy(t);});
 }else fallbackCopy(t);
}
function fallbackCopy(t){openModal('<h3>レポートを全選択してコピー</h3>'+
 '<textarea style="width:100%;height:300px;font-size:12px" onclick="this.select()">'+
 t.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</textarea>');}

/* ================= 共通UI ================= */
function openModal(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('show');}
window.closeModal=function(){document.getElementById('modal').classList.remove('show');if(tab==='food')render();};
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
 clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show');},2200);}
const TABS={home:homeTab,food:foodTab,train:trainTab,graph:graphTab,set:setTab};
function ic(paths){return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';}
const NAV=[
 ['home',ic('<path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/>'),'ホーム'],
 ['food',ic('<path d="M4 3v5a3 3 0 0 0 6 0V3"/><path d="M7 3v18"/><path d="M17 21V3c2.5 3 2.5 7 0 10"/>'),'食事'],
 ['train',ic('<path d="M6.5 6.5v11M3.5 9v6M17.5 6.5v11M20.5 9v6M6.5 12h11"/>'),'筋トレ'],
 ['graph',ic('<path d="M4 4v16h16"/><path d="M7 15l4-5 3 3 5-7"/>'),'グラフ'],
 ['set',ic('<path d="M5 8h14M5 16h14"/><circle cx="10" cy="8" r="2.2"/><circle cx="14" cy="16" r="2.2"/>'),'設定']];
window.go=function(t){tab=t;render();window.scrollTo(0,0);};
function render(){
 document.getElementById('dlabel').textContent=fmtShort(curDate)+(curDate===fmt(new Date())?'・今日':'');
 document.getElementById('view').innerHTML=TABS[tab]();
 document.getElementById('nav').innerHTML=NAV.map(n=>'<button class="'+(tab===n[0]?'on':'')+'" onclick="go(\''+n[0]+'\')"><span class="ic">'+n[1]+'</span>'+n[2]+'</button>').join('');
}
/* IndexedDB 写真 */
(function(){const req=indexedDB.open('mukimuki',1);
 req.onupgradeneeded=function(e){e.target.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});};
 req.onsuccess=function(e){db=e.target.result;};
})();
render();
</script>
